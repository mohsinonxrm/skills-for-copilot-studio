triggers:
  - displayName: When an upcoming event is starting soon
    description: This operation triggers a flow when an upcoming calendar event is starting.
    inputType:
      properties:
        lookAheadTimeInMinutes:
          displayName: Look-Ahead Time
          description: Time (in minutes) to look ahead for upcoming events.
          visibility: Advanced
          order: 1
          type: Number

        table:
          displayName: Calendar Id
          description: Unique identifier of the calendar.
          isRequired: true
          order: 0
          dynamicValuesConfig:
            capability: List

          type: String

    outputType:
      kind: Record
      properties:
        value:
          description: List of calendar items
          order: 0
          type:
            kind: Table
            properties:
              Attendees:
                displayName: Attendees
                description: List of attendees for the event
                order: 1
                type:
                  kind: Table
                  properties:
                    EmailAddress:
                      order: 2
                      type:
                        kind: Record
                        properties:
                          Address:
                            order: 1
                            type: String

                          Name:
                            order: 0
                            type: String

                    Status:
                      order: 0
                      type:
                        kind: Record
                        properties:
                          Response:
                            order: 0
                            enumValues:
                              - None
                              - Organizer
                              - TentativelyAccepted
                              - Accepted
                              - Declined
                              - NotResponded
                            type: String

                          Time:
                            order: 1
                            type: DateTime

                    Type:
                      order: 1
                      enumValues:
                        - Required
                        - Optional
                        - Resource
                      type: String

              Body:
                order: 2
                type:
                  kind: Record
                  properties:
                    Content:
                      order: 1
                      type: String

                    ContentType:
                      order: 0
                      enumValues:
                        - Text
                        - HTML
                      type: String

