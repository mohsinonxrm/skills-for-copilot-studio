                  kind: Table
                  properties:
                    ContentBytes:
                      displayName: Content
                      description: Attachment content
                      order: 2
                      type: File

                    ContentId:
                      displayName: Content Id
                      description: Content Id
                      order: 7
                      type: String

                    ContentType:
                      displayName: Content-Type
                      description: Attachment content type
                      order: 3
                      type: String

                    Id:
                      displayName: Attachment Id
                      description: Attachment Id
                      order: 0
                      type: String

                    IsInline:
                      displayName: Is Inline
                      description: Set to true if this is an inline attachment
                      order: 5
                      type: Boolean

                    LastModifiedDateTime:
                      displayName: Last Modified DateTime
                      description: The date and time when the attachment was last modified
                      order: 6
                      type: DateTime

                    Name:
                      displayName: Name
                      description: Attachment name
                      order: 1
                      type: String

                    Size:
                      displayName: Size
                      description: The size in bytes of the attachment
                      order: 4
                      type: Number

              Bcc:
                displayName: BCC
                description: The Bcc recipients for the message
                visibility: Advanced
                order: 3
                type: String

              Body:
                displayName: Body
                description: The body of the message
                order: 6
                type: String

              BodyPreview:
                displayName: Body Preview
                description: The preview of the message
                visibility: Advanced
                order: 8
                type: String

              Cc:
                displayName: CC
                description: The Cc recipients for the message
                visibility: Advanced
                order: 2
                type: String

              ConversationId:
                displayName: Conversation Id
