  - displayName: When a new event is created (V1)
    description: This operation triggers a flow when a new event is created in a calendar. (V1)
    inputType:
      properties:
        $orderby:
          displayName: Order By
          description: An ODATA orderBy query for specifying the order of entries.
          visibility: Advanced
          order: 1
          type: String

        $skip:
          displayName: Skip Count
          description: The number of entries to skip (default = 0).
          visibility: Advanced
          order: 3
          type: Number

        $top:
          displayName: Top Count
          description: Total number of entries to retrieve (default = all).
          visibility: Advanced
          order: 2
          type: Number

        table:
          displayName: Calendar id
          description: Select a calendar
          isRequired: true
          order: 0
          dynamicValuesConfig:
            capability: List

          type: String

    outputType:
      kind: Record
      properties:
        value:
          description: List of calendar items
          order: 0
          type:
            kind: Table
            properties:
              Attendees:
                displayName: Attendees
                description: List of attendees for the event
                order: 1
                type:
                  kind: Table
                  properties:
                    EmailAddress:
                      order: 2
                      type:
                        kind: Record
                        properties:
                          Address:
                            order: 1
                            type: String

                          Name:
                            order: 0
                            type: String

                    Status:
                      order: 0
                      type:
                        kind: Record
                        properties:
                          Response:
                            order: 0
                            enumValues:
                              - None
                              - Organizer
                              - TentativelyAccepted
                              - Accepted
                              - Declined
                              - NotResponded
                            type: String

                          Time:
                            order: 1
                            type: DateTime

                    Type:
                      order: 1
                      enumValues:
                        - Required
                        - Optional
                        - Resource
                      type: String

              Body:
                order: 2
                type:
                  kind: Record
                  properties:
                    Content:
                      order: 1
                      type: String

                    ContentType:
                      order: 0
                      enumValues:
                        - Text
                        - HTML
                      type: String

              BodyPreview:
                displayName: Body preview
                description: The preview of the message associated with the event
                visibility: Advanced
                order: 3
                type: String

              Categories:
                displayName: Categories
