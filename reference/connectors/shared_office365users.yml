          order: 22
          type: String
        responsibilities:
          displayName: Responsibilities
          description: A list of the user's responsibilities
          order: 23
          type: String
        schools:
          displayName: Schools
          description: A list of the user's schools attended
          order: 24
          type: String
        skills:
          displayName: Skills
          description: A list of the user's skills
          order: 25
          type: String
        state:
          displayName: State
          description: The state or province in the user's address
          order: 26
          type: String
        streetAddress:
          displayName: Street address
          description: The street address of the user's place of business
          order: 27
          type: String
        surname:
          displayName: Surname
          description: The user's surname (family name or last name)
          order: 28
          type: String
        userPrincipalName:
          displayName: User principal name
          description: The user principal name (UPN) of the user (e.g., user@contoso.com)
          order: 29
          type: String
        userType:
          displayName: User type
          description: The user type (Member or Guest)
          order: 30
          type: String
    operationId: UserProfile_V2

  - displayName: Get user photo
    description: Retrieves the photo of the specified user or the current user.
    inputType:
      properties:
        id:
          displayName: User (UPN)
          description: User principal name or user ID. Leave blank for current user.
          isRequired: false
          order: 0
          type: String
    outputType:
      kind: Record
      properties:
        value:
          displayName: Photo
          description: The user's photo as a base64-encoded string
          order: 0
          type: String
    operationId: UserPhoto

  - displayName: Search for users (V2)
    description: Searches for users in the organization by name, email, or other attributes using Microsoft Graph.
    inputType:
      properties:
        searchTerm:
          displayName: Search term
          description: Search text to find users (searches displayName and mail)
          isRequired: true
          order: 0
          type: String
        top:
          displayName: Top
          description: Maximum number of results to return
          isRequired: false
          order: 1
          type: Number
        $select:
          displayName: Select fields
          description: Comma-separated list of user properties to retrieve
          isRequired: false
          order: 2
          type: String
    outputType:
      kind: Table
      properties:
        value:
          description: List of matching users
          order: 0
          type:
            kind: Record
            properties:
              displayName:
                displayName: Display name
                order: 0
                type: String
              mail:
                displayName: Mail
                order: 1
                type: String
              id:
                displayName: Id
                order: 2
                type: String
              userPrincipalName:
                displayName: User principal name
                order: 3
                type: String
    operationId: SearchUser_V2

  - displayName: Get direct reports (V2)
    description: Retrieves the direct reports of the specified user from Microsoft Graph.
    inputType:
      properties:
        id:
          displayName: User (UPN)
          description: User principal name or user ID
          isRequired: true
          order: 0
          type: String
    outputType:
      kind: Table
      properties:
        value:
          description: List of direct reports
          order: 0
          type:
            kind: Record
            properties:
              displayName:
                displayName: Display name
                order: 0
                type: String
              mail:
                displayName: Mail
                order: 1
                type: String
              id:
                displayName: Id
                order: 2
                type: String
              jobTitle:
                displayName: Job title
                order: 3
                type: String
              department:
                displayName: Department
                order: 4
                type: String
    operationId: DirectReports_V2

  - displayName: Get manager (V2)
    description: Retrieves the manager of the specified user from Microsoft Graph.
    inputType:
      properties:
        id:
          displayName: User (UPN)
          description: User principal name or user ID
          isRequired: true
          order: 0
          type: String
    outputType:
      kind: Record
      properties:
        displayName:
          displayName: Display name
          description: The manager's display name
          order: 0
          type: String
        mail:
          displayName: Mail
          description: The manager's email address
          order: 1
          type: String
        id:
          displayName: Id
          description: The manager's unique identifier
          order: 2
          type: String
        jobTitle:
          displayName: Job title
          description: The manager's job title
          order: 3
          type: String
        department:
          displayName: Department
          description: The manager's department
          order: 4
          type: String
        userPrincipalName:
          displayName: User principal name
          description: The manager's UPN
          order: 5
          type: String
    operationId: Manager_V2
