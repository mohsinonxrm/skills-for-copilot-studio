        hireDate:
          displayName: Hire date
          description: The hire date of the user
          order: 10
          type: DateTime
        id:
          displayName: Id
          description: The unique identifier for the user
          order: 11
          type: String
        interests:
          displayName: Interests
          description: A list of the user's interests
          order: 12
          type: String
        jobTitle:
          displayName: Job title
          description: The user's job title
          order: 13
          type: String
        mail:
          displayName: Mail
          description: The SMTP address for the user
          order: 14
          type: String
        mailNickname:
          displayName: Mail nickname
          description: The mail alias for the user
          order: 15
          type: String
        mobilePhone:
          displayName: Mobile phone
          description: The primary cellular telephone number for the user
          order: 16
          type: String
        mySite:
          displayName: My site
          description: The URL for the user's personal site
          order: 17
          type: String
        officeLocation:
          displayName: Office location
          description: The office location in the user's place of business
          order: 18
          type: String
        pastProjects:
          displayName: Past projects
          description: A list of the user's past projects
          order: 19
