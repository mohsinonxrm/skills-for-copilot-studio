  - displayName: When a file is created (properties only)
    description: |-
      Triggers when an item is created in a library. Returns only the properties stored in the library columns.
                  You can add a "Get file content" step and use the "File identifier" property returned by this action to get to the contents of the file.
                  When using this with the On-Premises Data Gateway, the name of the library to connect to may need to be entered manually.
    inputType:
      properties:
        dataset:
          displayName: Site Address
          description: "Example: https://contoso.sharepoint.com/sites/sitename"
          isRequired: true
          order: 0
          dynamicValuesConfig:
            capability: List

          type: String

        folderPath:
          displayName: Folder
          description: Select a folder, or leave blank for the whole library
          order: 2
          type: String

        table:
          displayName: Library Name
          description: SharePoint library name
          isRequired: true
          order: 1
          dynamicValuesConfig:
            capability: List

          type: String

        view:
          displayName: Limit Columns by View
          description: Avoid column threshold issues by only using columns defined in a view
          visibility: Advanced
          order: 3
          dynamicValuesConfig:
            capability: List

          type: String

    outputType: UnresolvedDynamicType
    triggerId: GetOnNewFileItems

