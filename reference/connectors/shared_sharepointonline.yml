          displayName: Requesting Site Id
          description: Id of the requesting site.
          isRequired: true
          order: 1
          type: String

    outputType:
      kind: Record
      properties:
        ApprovalToken:
          description: Approval Token
          order: 0
          type: String

    operationId: ApproveHubSiteJoin

  - displayName: Cancel hub site join request
