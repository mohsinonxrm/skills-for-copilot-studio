  - displayName: Send an HTTP request to Azure DevOps
    description: "Construct an Azure DevOps REST API request to invoke. Please refer to the following link for all available endpoints: https://docs.microsoft.com/rest/api/azure/devops"
    inputType:
      properties:
        account:
          displayName: Organization Name
          description: The name of the Organization. This can be found in the instance URL i.e. {Organization}.visualstudio.com. The Organization should have "Third-party application access via OAuth" enabled to prevent errors in the operation.
          isRequired: true
          order: 0
          dynamicValuesConfig:
            capability: List

          type: String

        Body:
          displayName: Body
          description: The request content. Can be JSON object or binary data encoded as Base64 string.
          order: 4
          type: String

        Headers:
          displayName: Headers
          description: The request headers.
          order: 3
          type: Any

        IsBase64:
          displayName: Body is Base64
          description: Must be true if request content is encoded as Base64 string.
          order: 5
          type: Boolean

        Method:
          displayName: Method
          description: The HTTP method.
          isRequired: true
          order: 1
          enumValues:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          type: String

        Uri:
          displayName: Relative URI
          description: "The relative URI. Example: {project}/{team}/_apis/wit/templates?api-version=5.0-preview.1."
          isRequired: true
          order: 2
          type: String

    outputType: Any
    operationId: HttpRequest

