operations:
  - displayName: Search for work items
    description: Provides a set of results for the search text.
    inputType:
      properties:
        $orderBy:
          displayName: Order By
          description: Options for sorting search results. If set to null, the results will be returned sorted by relevance. If more than one sort option is provided, the results are sorted in the order specified in the OrderBy.
          visibility: Advanced
          order: 7
          type:
            kind: Table
            properties:
              field:
                displayName: Field
                description: Field name on which sorting should be done.
                order: 0
                type: String

              sortOrder:
                displayName: Sort Order
                description: Order (ASC/DESC) in which the results should be sorted.
                order: 1
                type: String

        $skip:
          displayName: Skip
          description: Number of results to be skipped. Defaults to 0.
          visibility: Advanced
          order: 3
          type: Number

        $top:
          displayName: Top
          description: Number of results to be returned. Defaults to 100.
          visibility: Advanced
          order: 4
          type: Number

        account:
          displayName: Organization Name
          description: The name of the Organization. This can be found in the instance URL i.e. {Organization}.visualstudio.com. The Organization should have \"Third-party application access via OAuth\" enabled to prevent errors in the operation.
          isRequired: true
          order: 0
          dynamicValuesConfig:
            capability: List

          type: String

        filters:
          displayName: Filters
          description: Filters to be applied. Set it to null if there are no filters to be applied.
          visibility: Advanced
          order: 5
          type: Any

        includeFacets:
          displayName: Include Facets
          description: Flag to opt for faceting in the result. Default behavior is false.
          visibility: Advanced
          order: 6
          type: Boolean

        project:
          displayName: Project Name
          description: The name of the project within the specified Organization.
          isRequired: true
          order: 1
          dynamicValuesConfig:
            capability: List

          type: String

        searchText:
          displayName: Search Text
          description: The search text.
          order: 2
          type: String

    outputType:
      kind: Record
      properties:
        count:
          displayName: Count
          description: Total number of matched work items.
          order: 0
          type: Number

        facets:
          displayName: Facets
          description: A dictionary storing an array of Filter object against each facet.
          visibility: Advanced
          order: 3
          type: Any

        infoCode:
          displayName: Info Code
          description: Numeric code indicating any additional information.
          visibility: Advanced
          order: 2
          type: Number

        results:
          displayName: Results
          description: List of top matched work items.
          order: 1
          type:
            kind: Table
            properties:
              fields:
                displayName: Fields
                description: A standard set of work item fields and their values.
                order: 1
                type: Any

              hits:
                displayName: Hits
                description: Highlighted snippets of fields that match the search request.
                visibility: Advanced
                order: 2
                type:
                  kind: Table
                  properties:
                    fieldReferenceName:
                      displayName: Field Reference Name
                      description: Reference name of the highlighted field.
                      order: 0
                      type: String

                    highlights:
                      displayName: Highlights
                      description: Matched/highlighted snippets of the field.
                      order: 1
                      type:
                        kind: Table
                        properties:
                          Value: String

              project:
                description: Project details for search results
                order: 0
                type:
                  kind: Record
                  properties:
                    id:
                      displayName: Id
                      description: Id of the project.
                      order: 0
                      type: String

                    name:
                      displayName: Name
                      description: Name of the project.
                      order: 1
                      type: String

              url:
                displayName: URL
                description: Reference to the work item.
                visibility: Advanced
                order: 3
                type: String

    operationId: SearchWorkItemsAsync

